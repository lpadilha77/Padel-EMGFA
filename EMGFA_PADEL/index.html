<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PADEL - Acesso Rápido</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #007AFF 0%, #5AC8FA 100%);
        }
        
        .container {
            text-align: center;
            background: white;
            padding: 3rem 2rem;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
        }
        
        h1 {
            margin: 0 0 0.5rem 0;
            color: #007AFF;
            font-size: 3rem;
        }
        
        p {
            color: #666;
            margin: 1rem 0 2rem 0;
            line-height: 1.6;
        }
        
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #007AFF 0%, #5AC8FA 100%);
            color: white;
            padding: 1rem 2rem;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            margin: 0.5rem;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 122, 255, 0.3);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 1px solid #ddd;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
        }
        
        .info {
            background: #f0f8ff;
            padding: 1rem;
            border-radius: 10px;
            margin-top: 2rem;
            text-align: left;
            font-size: 0.9rem;
            color: #333;
            border-left: 4px solid #007AFF;
        }
        
        .info strong {
            color: #007AFF;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎾</h1>
        <h1>PADEL</h1>
        <p>Gestor de Resultados</p>
        
        <a href="app/index.html" class="btn">Abrir Aplicação</a>
        <a href="app/mobile.html" class="btn btn-secondary">Abrir Versão Mobile</a>
        <button class="btn btn-secondary" onclick="loadSampleData()">Carregar Dados de Teste</button>
        
        <div class="info">
            <strong>💡 Dica:</strong> Clique em "Versão Mobile" para abrir a interface adaptada para telemóvel.
        </div>
    </div>

    <script>
        function loadSampleData() {
            // Dados de exemplo
            const sampleGames = [
                {
                    id: 1000001,
                    date: "2026-05-01",
                    equipa_a: { j1: "João Silva", j2: "Maria Santos" },
                    equipa_b: { j1: "Pedro Costa", j2: "Ana Oliveira" },
                    sets: [
                        { a: 6, b: 4 },
                        { a: 3, b: 6 },
                        { a: 6, b: 2 }
                    ],
                    winner: "A"
                },
                {
                    id: 1000002,
                    date: "2026-05-03",
                    equipa_a: { j1: "Carlos Mendes", j2: "Sofia Dias" },
                    equipa_b: { j1: "João Silva", j2: "Pedro Costa" },
                    sets: [
                        { a: 4, b: 6 },
                        { a: 5, b: 7 }
                    ],
                    winner: "B"
                },
                {
                    id: 1000003,
                    date: "2026-05-05",
                    equipa_a: { j1: "Maria Santos", j2: "Ana Oliveira" },
                    equipa_b: { j1: "Carlos Mendes", j2: "Sofia Dias" },
                    sets: [
                        { a: 6, b: 3 },
                        { a: 6, b: 4 }
                    ],
                    winner: "A"
                },
                {
                    id: 1000004,
                    date: "2026-05-07",
                    equipa_a: { j1: "João Silva", j2: "Carlos Mendes" },
                    equipa_b: { j1: "Pedro Costa", j2: "Sofia Dias" },
                    sets: [
                        { a: 5, b: 7 },
                        { a: 6, b: 4 },
                        { a: 7, b: 5 }
                    ],
                    winner: "A"
                },
                {
                    id: 1000005,
                    date: "2026-05-09",
                    equipa_a: { j1: "Maria Santos", j2: "Sofia Dias" },
                    equipa_b: { j1: "Pedro Costa", j2: "Ana Oliveira" },
                    sets: [
                        { a: 6, b: 6 },
                        { a: 7, b: 5 }
                    ],
                    winner: "A"
                }
            ];

            // Guardar no localStorage
            localStorage.setItem('padel_games', JSON.stringify(sampleGames));

            // Recalcular todas as estatísticas
            const stats = {};
            const players = {};

            sampleGames.forEach(game => {
                [game.equipa_a.j1, game.equipa_a.j2, game.equipa_b.j1, game.equipa_b.j2].forEach(jogador => {
                    if (!stats[jogador]) {
                        stats[jogador] = {
                            nome: jogador,
                            pontos: 0,
                            jogos: 0,
                            vitorias: 0,
                            derrotas: 0,
                            setsGanhos: 0,
                            setsPerdidos: 0
                        };
                    }
                    if (!players[jogador]) {
                        players[jogador] = true;
                    }
                });

                if (game.winner === 'A') {
                    stats[game.equipa_a.j1].pontos += 3;
                    stats[game.equipa_a.j2].pontos += 3;
                    stats[game.equipa_a.j1].vitorias += 1;
                    stats[game.equipa_a.j2].vitorias += 1;

                    stats[game.equipa_b.j1].pontos += 1;
                    stats[game.equipa_b.j2].pontos += 1;
                    stats[game.equipa_b.j1].derrotas += 1;
                    stats[game.equipa_b.j2].derrotas += 1;
                } else {
                    stats[game.equipa_b.j1].pontos += 3;
                    stats[game.equipa_b.j2].pontos += 3;
                    stats[game.equipa_b.j1].vitorias += 1;
                    stats[game.equipa_b.j2].vitorias += 1;

                    stats[game.equipa_a.j1].pontos += 1;
                    stats[game.equipa_a.j2].pontos += 1;
                    stats[game.equipa_a.j1].derrotas += 1;
                    stats[game.equipa_a.j2].derrotas += 1;
                }

                stats[game.equipa_a.j1].jogos += 1;
                stats[game.equipa_a.j2].jogos += 1;
                stats[game.equipa_b.j1].jogos += 1;
                stats[game.equipa_b.j2].jogos += 1;

                game.sets.forEach(set => {
                    const scoreA = parseInt(set.a) || 0;
                    const scoreB = parseInt(set.b) || 0;

                    if (scoreA > scoreB) {
                        stats[game.equipa_a.j1].setsGanhos += 1;
                        stats[game.equipa_a.j2].setsGanhos += 1;
                        stats[game.equipa_b.j1].setsPerdidos += 1;
                        stats[game.equipa_b.j2].setsPerdidos += 1;
                    } else if (scoreB > scoreA) {
                        stats[game.equipa_b.j1].setsGanhos += 1;
                        stats[game.equipa_b.j2].setsGanhos += 1;
                        stats[game.equipa_a.j1].setsPerdidos += 1;
                        stats[game.equipa_a.j2].setsPerdidos += 1;
                    }
                });
            });

            localStorage.setItem('padel_stats', JSON.stringify(stats));
            localStorage.setItem('padel_players', JSON.stringify(players));

            alert('✅ Dados de teste carregados com sucesso!\n\nAgora pode abrir a aplicação e verá a classificação preenchida.');
            window.location.href = 'app/index.html';
        }
    </script>
</body>
</html>
